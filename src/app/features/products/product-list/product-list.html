<div class="product-list-header">
  <h1>Produtos</h1>
  <button mat-raised-button color="primary" (click)="newProduct()">
    <mat-icon>add</mat-icon>
    Novo Produto
  </button>
</div>

<table mat-table [dataSource]="products()" class="product-table">
  <ng-container matColumnDef="image">
    <th mat-header-cell *matHeaderCellDef>Imagem</th>
    <td mat-cell *matCellDef="let product">
      <img [src]="product.image" [alt]="product.title" class="product-image" />
    </td>
  </ng-container>

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let product">{{ product.title }}</td>
  </ng-container>

  <ng-container matColumnDef="type">
    <th mat-header-cell *matHeaderCellDef>Tipo</th>
    <td mat-cell *matCellDef="let product">{{ product.type?.name || '-' }}</td>
  </ng-container>

  <ng-container matColumnDef="category">
    <th mat-header-cell *matHeaderCellDef>Categoria</th>
    <td mat-cell *matCellDef="let product">{{ product.category?.name || '-' }}</td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef>Preço</th>
    <td mat-cell *matCellDef="let product">{{ product.price | currency: 'BRL' }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Ações</th>
    <td mat-cell *matCellDef="let product">
      <button mat-icon-button (click)="editProduct(product.id)" matTooltip="Editar">
        <mat-icon>edit</mat-icon>
      </button>
      <button
        mat-icon-button
        color="warn"
        (click)="deleteProduct(product.id, product.title)"
        matTooltip="Excluir"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

@if (products().length === 0) {
  <p class="empty-message">Nenhum produto encontrado.</p>
}
