<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>{{ isEdit() ? 'Editar Produto' : 'Novo Produto' }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form (ngSubmit)="onSubmit()" class="product-form">
      <mat-form-field appearance="outline">
        <mat-label>Nome</mat-label>
        <input matInput [(ngModel)]="form.title" name="title" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>URL da Imagem</mat-label>
        <input matInput [(ngModel)]="form.image" name="image" />
        <mat-icon matPrefix>image</mat-icon>
      </mat-form-field>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Preço</mat-label>
          <input matInput type="number" [(ngModel)]="form.price" name="price" step="0.01" />
          <span matTextPrefix>R$&nbsp;</span>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Ordem</mat-label>
          <input matInput type="number" [(ngModel)]="form.order" name="order" />
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Tipo de Produto</mat-label>
          <mat-select [(ngModel)]="form.productTypeId" name="productTypeId" required>
            @for (type of productTypes(); track type.id) {
              <mat-option [value]="type.id">{{ type.name }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Categoria</mat-label>
          <mat-select [(ngModel)]="form.categoryId" name="categoryId">
            <mat-option [value]="undefined">Nenhuma</mat-option>
            @for (cat of categories(); track cat.id) {
              <mat-option [value]="cat.id">{{ cat.name }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button mat-button type="button" (click)="cancel()">Cancelar</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading()">
          @if (loading()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            {{ isEdit() ? 'Salvar' : 'Criar' }}
          }
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
