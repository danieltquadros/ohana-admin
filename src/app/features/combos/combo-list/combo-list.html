<div class="combo-list-header">
  <h1>Combos</h1>
  <button mat-raised-button color="primary" (click)="newCombo()">
    <mat-icon>add</mat-icon>
    Novo Combo
  </button>
</div>

<table mat-table [dataSource]="combos()" class="combo-table">
  <ng-container matColumnDef="image">
    <th mat-header-cell *matHeaderCellDef>Imagem</th>
    <td mat-cell *matCellDef="let combo">
      <img [src]="combo.image" [alt]="combo.name" class="combo-image" />
    </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let combo">{{ combo.name }}</td>
  </ng-container>

  <ng-container matColumnDef="category">
    <th mat-header-cell *matHeaderCellDef>Categoria</th>
    <td mat-cell *matCellDef="let combo">{{ combo.category?.name || '-' }}</td>
  </ng-container>

  <ng-container matColumnDef="products">
    <th mat-header-cell *matHeaderCellDef>Produtos</th>
    <td mat-cell *matCellDef="let combo">{{ combo.products?.length || 0 }}</td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef>Preço</th>
    <td mat-cell *matCellDef="let combo">{{ combo.price | currency: 'BRL' }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Ações</th>
    <td mat-cell *matCellDef="let combo">
      <button mat-icon-button (click)="editCombo(combo.id)" matTooltip="Editar">
        <mat-icon>edit</mat-icon>
      </button>
      <button
        mat-icon-button
        color="warn"
        (click)="deleteCombo(combo.id, combo.name)"
        matTooltip="Excluir"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

@if (combos().length === 0) {
  <p class="empty-message">Nenhum combo encontrado.</p>
}
