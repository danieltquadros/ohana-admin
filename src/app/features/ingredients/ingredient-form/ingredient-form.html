<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>{{ isEdit() ? 'Editar Ingrediente' : 'Novo Ingrediente' }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form (ngSubmit)="onSubmit()" class="ingredient-form">
      <mat-form-field appearance="outline">
        <mat-label>Nome</mat-label>
        <input matInput [(ngModel)]="form.name" name="name" required />
      </mat-form-field>
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Descrição</mat-label>
          <input matInput [(ngModel)]="form.description" name="description" />
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Alergênico</mat-label>
          <mat-select [(ngModel)]="form.isAllergenic" name="isAllergenic" required>
            <mat-option [value]="true">Sim</mat-option>
            <mat-option [value]="false">Não</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="form-actions">
        <button mat-button type="button" (click)="cancel()">Cancelar</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading()">
          @if (loading()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            {{ isEdit() ? 'Salvar' : 'Criar' }}
          }
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
