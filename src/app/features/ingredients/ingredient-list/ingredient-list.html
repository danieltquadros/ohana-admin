<div class="ingredient-list-header">
  <h1>Ingredientes</h1>
  <button mat-raised-button color="primary" (click)="newIngredient()">
    <mat-icon>add</mat-icon>
    Novo Ingrediente
  </button>
</div>

<table mat-table [dataSource]="ingredients()" class="ingredient-table">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let ingredient">{{ ingredient.name }}</td>
  </ng-container>

  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef>Descrição</th>
    <td mat-cell *matCellDef="let ingredient">{{ ingredient.description || '-' }}</td>
  </ng-container>

  <ng-container matColumnDef="isAllergenic">
    <th mat-header-cell *matHeaderCellDef>É Alérgico</th>
    <td mat-cell *matCellDef="let ingredient">
      {{ ingredient.isAllergenic ? 'Sim' : 'Não' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Ações</th>
    <td mat-cell *matCellDef="let ingredient">
      <button mat-icon-button (click)="editIngredient(ingredient.id)" matTooltip="Editar">
        <mat-icon>edit</mat-icon>
      </button>
      <button
        mat-icon-button
        color="warn"
        (click)="deleteIngredient(ingredient.id, ingredient.name)"
        matTooltip="Excluir"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

@if (ingredients().length === 0) {
  <p class="empty-message">Nenhum ingrediente encontrado.</p>
}
