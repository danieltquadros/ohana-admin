<h2 mat-dialog-title>Novo Ingrediente</h2>

<form (ngSubmit)="onSubmit()">
  <mat-dialog-content class="dialog-content">
    <mat-form-field appearance="outline">
      <mat-label>Nome</mat-label>
      <input matInput [(ngModel)]="form.name" name="name" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descrição (opcional)</mat-label>
      <textarea matInput [(ngModel)]="form.description" name="description" rows="2"></textarea>
    </mat-form-field>

    <mat-checkbox [(ngModel)]="form.isAllergenic" name="isAllergenic"> É alérgico? </mat-checkbox>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancelar</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="saving()">
      @if (saving()) {
        <mat-spinner diameter="20"></mat-spinner>
      } @else {
        Criar
      }
    </button>
  </mat-dialog-actions>
</form>
