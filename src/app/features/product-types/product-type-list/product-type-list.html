<div class="list-header">
  <h1>Tipos de Produto</h1>
  <div class="header-actions">
    <mat-slide-toggle
      [(ngModel)]="showInactive"
      (change)="onToggleInactive()"
    >
      Mostrar inativos
    </mat-slide-toggle>
    <button mat-raised-button color="primary" (click)="newProductType()">
      <mat-icon>add</mat-icon>
      Novo Tipo
    </button>
  </div>
</div>

<table mat-table [dataSource]="productTypes()" class="data-table">
  <ng-container matColumnDef="label">
    <th mat-header-cell *matHeaderCellDef>Nome de Exibição</th>
    <td mat-cell *matCellDef="let type">{{ type.label }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Identificador Técnico</th>
    <td mat-cell *matCellDef="let type">
      <code class="tech-code">{{ type.name }}</code>
    </td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let type">
      @if (type.isActive) {
        <mat-chip class="status-chip status-active">Ativo</mat-chip>
      } @else {
        <mat-chip class="status-chip status-inactive">Inativo</mat-chip>
      }
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Ações</th>
    <td mat-cell *matCellDef="let type">
      <button mat-icon-button (click)="editProductType(type.id)" matTooltip="Editar">
        <mat-icon>edit</mat-icon>
      </button>
      @if (type.isActive) {
        <button mat-icon-button (click)="toggleActive(type)" matTooltip="Desativar">
          <mat-icon>visibility_off</mat-icon>
        </button>
      } @else {
        <button mat-icon-button color="primary" (click)="toggleActive(type)" matTooltip="Ativar">
          <mat-icon>visibility</mat-icon>
        </button>
      }
      <button
        mat-icon-button
        color="warn"
        (click)="deleteProductType(type.id, type.label)"
        matTooltip="Excluir definitivamente"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    [class.inactive-row]="!row.isActive"
  ></tr>
</table>

@if (productTypes().length === 0) {
  <p class="empty-message">Nenhum tipo de produto encontrado.</p>
}
